examples:
  - question: "Как отсортировать список словарей по ключу age?"
    answer: |
      Для сортировки списка словарей можно использовать функцию `sorted()`.

      Пример:

      ```python
      users = [
          {"name": "Alice", "age": 25},
          {"name": "Bob", "age": 20},
          {"name": "Charlie", "age": 30},
      ]

      sorted_users = sorted(users, key=lambda user: user["age"])

      print(sorted_users)
      ```

      Функция `key` определяет поле, по которому выполняется сортировка.

  - question: "Как отфильтровать список чисел и оставить только чётные?"
    answer: |
      Можно использовать функцию `filter()` или list comprehension.

      Пример:

      ```python
      numbers = [1, 2, 3, 4, 5, 6]

      even_numbers = [number for number in numbers if number % 2 == 0]

      print(even_numbers)
      ```

      Здесь условие `number % 2 == 0` оставляет только чётные числа.

  - question: "Как сгруппировать элементы списка по значению поля?"
    answer: |
      Для группировки удобно использовать `defaultdict`.

      Пример:

      ```python
      from collections import defaultdict

      items = [
          {"category": "fruit", "name": "apple"},
          {"category": "fruit", "name": "banana"},
          {"category": "vegetable", "name": "carrot"},
      ]

      grouped_items = defaultdict(list)

      for item in items:
          grouped_items[item["category"]].append(item)

      print(dict(grouped_items))
      ```

      `defaultdict(list)` автоматически создаёт список для новой категории.